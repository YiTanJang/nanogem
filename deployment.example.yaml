apiVersion: v1
kind: ServiceAccount
metadata:
  name: nanogem-controller
  namespace: nanogem
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: nanogem
  name: nanogem-pod-manager
rules:
- apiGroups: ["", "batch"]
  resources: ["pods", "pods/log", "pods/status", "jobs", "jobs/status"]
  verbs: ["get", "list", "watch", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nanogem-pod-manager-binding
  namespace: nanogem
subjects:
- kind: ServiceAccount
  name: nanogem-controller
  namespace: nanogem
roleRef:
  kind: Role
  name: nanogem-pod-manager
  apiGroup: rbac.authorization.k8s.io
---
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nanogem-builder
  namespace: nanogem
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nanogem-builder-role
  namespace: nanogem
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["nanogem"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nanogem-builder-binding
  namespace: nanogem
subjects:
  - kind: ServiceAccount
    name: nanogem-builder
    namespace: nanogem
roleRef:
  kind: Role
  name: nanogem-builder-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanogem
  namespace: nanogem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nanogem
  template:
    metadata:
      labels:
        app: nanogem
    spec:
      serviceAccountName: nanogem-controller
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: controller
        image: <REGISTRY_IP>:30500/nanogem:latest
        imagePullPolicy: Always
        workingDir: /app
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nanogem-secrets
              key: GEMINI_API_KEY
        - name: CONTAINER_RUNTIME
          value: "k8s"
        - name: K8S_NAMESPACE
          value: "nanogem"
        - name: K8S_PVC_NAME
          value: "nanogem-pvc-final"
        - name: K8S_PVC_SUBPATH
          value: "."
        - name: CONTAINER_IMAGE
          value: "<REGISTRY_IP>:30500/nanogem-agent:latest"
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: nanogem-secrets
              key: DISCORD_BOT_TOKEN
        - name: GIT_AUTHOR_NAME
          value: "Andy (NanoClaw Swarm)"
        - name: GIT_AUTHOR_EMAIL
          value: "andy@nanogem.local"
        - name: GIT_COMMITTER_NAME
          value: "Andy (NanoClaw Swarm)"
        - name: GIT_COMMITTER_EMAIL
          value: "andy@nanogem.local"
        volumeMounts:
        - name: storage
          mountPath: /app
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: nanogem-pvc-final
