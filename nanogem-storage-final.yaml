apiVersion: v1
kind: PersistentVolume
metadata:
  name: nanogem-pv-final
spec:
  capacity:
    storage: 1800Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=3
    - tcp
    - nolock
  nfs:
    path: /export/Private_Data/app_data/nanogem/project
    server: 10.0.0.200
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nanogem-pvc-final
  namespace: nanogem
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1800Gi
  volumeName: nanogem-pv-final
